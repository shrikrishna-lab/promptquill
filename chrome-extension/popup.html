<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #080808;
      color: #fff;
    }
    
    .container {
      padding: 20px;
    }
    
    h1 {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .form-group {
      margin-bottom: 16px;
    }
    
    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    
    input, textarea {
      width: 100%;
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 12px;
      color: #fff;
      font-family: inherit;
    }
    
    textarea {
      resize: vertical;
      min-height: 100px;
    }
    
    .button-group {
      display: flex;
      gap: 12px;
    }
    
    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s;
    }
    
    .btn-primary {
      background: #a3e635;
      color: #000;
    }
    
    .btn-primary:hover {
      background: #ccff00;
    }
    
    .btn-secondary {
      background: #222;
      color: #fff;
    }
    
    .btn-secondary:hover {
      background: #333;
    }
    
    .status {
      padding: 12px;
      background: #111;
      border-radius: 8px;
      border: 1px solid #a3e635;
      margin-bottom: 16px;
      display: none;
    }
    
    .status.show {
      display: block;
    }
    
    .status.success {
      color: #a3e635;
      border-color: #a3e635;
    }
    
    .status.error {
      color: #ff6b6b;
      border-color: #ff6b6b;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>💾 Save Prompt</h1>
    
    <div id="status" class="status"></div>
    
    <div class="form-group">
      <label>Selected Text</label>
      <textarea id="promptContent" placeholder="Selected text will appear here..." readonly></textarea>
    </div>
    
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="promptTitle" placeholder="Give your prompt a title">
    </div>
    
    <div class="form-group">
      <label>Category</label>
      <input type="text" id="promptCategory" placeholder="e.g., Marketing, Writing, Code">
    </div>
    
    <div class="form-group">
      <label>Description</label>
      <textarea id="promptDescription" placeholder="Add a description (optional)"></textarea>
    </div>
    
    <div class="form-group">
      <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; margin-bottom: 8px;">
        <input type="checkbox" id="isPublic" checked>
        <span>Share with Community</span>
      </label>
    </div>
    
    <div class="button-group">
      <button class="btn-primary" id="save-btn">✓ Save Prompt</button>
      <button class="btn-secondary" id="close-btn">Close</button>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
