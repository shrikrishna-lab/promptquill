name: Mobile Android Build

on:
  push:
    branches:
      - mobile

permissions:
  contents: read

jobs:
  android:
    name: Build signed Android artifact
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Build mobile web bundle
        run: npm run mobile:build

      - name: Decode Android keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          mkdir -p mobile/android/keystores
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > mobile/android/keystores/promptquill-release.jks

      - name: Configure signing
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          cat >> mobile/android/gradle.properties <<'EOF'
          PROMPTQUILL_RELEASE_STORE_FILE=keystores/promptquill-release.jks
          PROMPTQUILL_RELEASE_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}
          PROMPTQUILL_RELEASE_STORE_PASSWORD=${{ secrets.ANDROID_STORE_PASSWORD }}
          PROMPTQUILL_RELEASE_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build release APK
        working-directory: mobile/android
        run: ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: promptquill-android-release-apk
          path: mobile/android/app/build/outputs/apk/release/*.apk
