<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>PromptQuill APK Download</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #08111f, #111c33 48%, #1b2e4d);
        color: #f5f7fb;
      }
      main {
        width: min(92vw, 28rem);
        padding: 2rem;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 1.5rem;
        background: rgba(6, 11, 20, 0.72);
        backdrop-filter: blur(18px);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.7rem;
      }
      p {
        margin: 0 0 1.25rem;
        line-height: 1.5;
        color: rgba(245, 247, 251, 0.82);
      }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 3.25rem;
        border-radius: 999px;
        background: #f5f7fb;
        color: #08111f;
        font-weight: 700;
        text-decoration: none;
      }
      small {
        display: block;
        margin-top: 1rem;
        color: rgba(245, 247, 251, 0.65);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>PromptQuill APK</h1>
      <p>If the download does not start automatically on mobile, tap the button below.</p>
      <a id="downloadLink" href="./app-debug.apk" download>Download APK</a>
      <small>File: app-debug.apk</small>
    </main>
    <script>
      const link = document.getElementById('downloadLink');
      setTimeout(() => link.click(), 250);
    </script>
  </body>
</html>
